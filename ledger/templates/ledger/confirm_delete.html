{% extends 'ledger/base.html' %}
{% block title %}Удаление{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-body">
                <h1 class="h4">Подтвердите удаление</h1>
                <p class="mb-4">Вы действительно хотите удалить: <strong>{{ object }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Удалить</button>
                    {% if cancel_url %}
                        <a class="btn btn-outline-secondary" href="{{ cancel_url }}">Отмена</a>
                    {% else %}
                        <a class="btn btn-outline-secondary" href="{% url 'ledger:record_list' %}">Отмена</a>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
